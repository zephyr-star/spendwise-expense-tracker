version: '3.9'

services:
  # ── PostgreSQL Database ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=spendwise
      - POSTGRES_USER=spendwise
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - spendwise_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendwise -d spendwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache + Queue ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - spendwise_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://spendwise:${POSTGRES_PASSWORD}@postgres:5432/spendwise
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ENVIRONMENT=development
      - STORAGE_BACKEND=local
      - OCR_BACKEND=tesseract
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5173","capacitor://localhost"]
      # Optional — leave blank to skip
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET_RECEIPTS=${S3_BUCKET_RECEIPTS:-spendwise-receipts}
      - FIREBASE_SERVER_KEY=${FIREBASE_SERVER_KEY:-}
      - CLOUD_ML_ENABLED=false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spendwise_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:

networks:
  spendwise_net:
    driver: bridge